    </linearGradient>
    <linearGradient id="accent" x1="438" y1="620" x2="728" y2="774" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#48D7D0" />
      <stop offset="1" stop-color="#67BDF3" />
