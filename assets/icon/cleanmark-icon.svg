<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="tile" x1="150" y1="100" x2="860" y2="930" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#173B63" />
      <stop offset="0.55" stop-color="#102C4C" />
      <stop offset="1" stop-color="#091B31" />
    </linearGradient>
    <linearGradient id="ink" x1="314" y1="268" x2="712" y2="760" gradientUnits="userSpaceOnUse">
