  <rect x="88" y="88" width="848" height="848" rx="204" fill="none" stroke="#5DB9DA" stroke-opacity="0.18" stroke-width="8" />

  <!-- An ink drop becomes a fountain-pen nib: clear even at small icon sizes. -->
  <path
    d="M512 194C449 283 337 394 337 526c0 104 77 185 175 185s175-81 175-185c0-132-112-243-175-332Z"
