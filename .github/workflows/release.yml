name: Windows Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: 校验标签版本
        shell: powershell
        run: |
          $version = (Get-Content package.json -Raw -Encoding UTF8 | ConvertFrom-Json).version
          $expectedTag = "v$version"
          $actualTag = "${{ github.ref_name }}"
          if ($actualTag -ne $expectedTag) {
            throw "Git tag '$actualTag' does not match package.json version '$expectedTag'."
          }
      - run: npm run check
      - run: npm run smoke
      - run: npm run test:e2e
      - run: npm audit
      - run: npm run installer:win
      - name: 验证安装、已安装应用和卸载
        shell: powershell
        run: |
          $version = (Get-Content package.json -Raw -Encoding UTF8 | ConvertFrom-Json).version
          $installer = Get-Item "release/installer/CleanMark-$version-Setup.exe"
          $installDir = Join-Path $env:RUNNER_TEMP "cleanmark-installed"
          try {
            $installProcess = Start-Process -FilePath $installer.FullName -ArgumentList @(
              '/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART', '/TASKS=', "/DIR=$installDir"
            ) -WindowStyle Hidden -Wait -PassThru
            if ($installProcess.ExitCode -ne 0) { throw "Installer exited with $($installProcess.ExitCode)." }
            $smokeProcess = Start-Process -FilePath "$installDir\清墨.exe" -ArgumentList '--smoke-test' -WindowStyle Hidden -Wait -PassThru
            if ($smokeProcess.ExitCode -ne 0) { throw "Installed smoke test exited with $($smokeProcess.ExitCode)." }
            node scripts/prepare-e2e.mjs
            $e2eDirectory = (Resolve-Path "test-results/md-workspace").Path
            $e2eProcess = Start-Process -FilePath "$installDir\清墨.exe" -ArgumentList @(
              '--e2e-test', "--e2e-dir=$e2eDirectory"
            ) -WindowStyle Hidden -Wait -PassThru
            if ($e2eProcess.ExitCode -ne 0) { throw "Installed E2E test exited with $($e2eProcess.ExitCode)." }
          } finally {
            if (Test-Path "$installDir\unins000.exe") {
              $uninstallProcess = Start-Process -FilePath "$installDir\unins000.exe" -ArgumentList @(
                '/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART'
              ) -WindowStyle Hidden -Wait -PassThru
              if ($uninstallProcess.ExitCode -ne 0) { throw "Uninstaller exited with $($uninstallProcess.ExitCode)." }
            }
          }
      - name: 准备 GitHub Release 文件
        shell: powershell
        run: |
          $version = (Get-Content package.json -Raw -Encoding UTF8 | ConvertFrom-Json).version
          $releaseName = "CleanMark-$version-Setup.exe"
          $releasePath = "release/installer/$releaseName"
          if (!(Test-Path -LiteralPath $releasePath)) { throw "Missing release asset $releaseName." }
          Get-FileHash $releasePath -Algorithm SHA256 | ForEach-Object { "$($_.Hash)  $releaseName" } | Set-Content -Encoding ascii "release/installer/SHA256SUMS.txt"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cleanmark-windows-installer
          path: |
            release/installer/CleanMark-*-Setup.exe
            release/installer/SHA256SUMS.txt
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: |
            release/installer/CleanMark-*-Setup.exe
            release/installer/SHA256SUMS.txt
          body: |
            清墨 Windows 安装器，仅安装到当前用户目录，不需要管理员权限。

            当前版本尚未进行商业代码签名，Windows 可能显示“未知发布者”。请从本仓库 Release 下载并核对 SHA-256。
