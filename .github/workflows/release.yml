name: Windows Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: 校验标签版本
        shell: powershell
        run: |
          $version = (Get-Content package.json -Raw -Encoding UTF8 | ConvertFrom-Json).version
          $expectedTag = "v$version"
          $actualTag = "${{ github.ref_name }}"
          if ($actualTag -ne $expectedTag) {
            throw "Git tag '$actualTag' does not match package.json version '$expectedTag'."
          }
      - run: npm run check
      - run: npm run smoke
      - run: npm run test:e2e
      - run: npm audit
      - run: npm run installer:win
      - name: 验证安装、已安装应用和卸载
        run: node scripts/test-installed.mjs
      - name: 准备 GitHub Release 文件
        shell: powershell
        run: |
          $version = (Get-Content package.json -Raw -Encoding UTF8 | ConvertFrom-Json).version
          $releaseName = "CleanMark-$version-Setup.exe"
          $releasePath = "release/installer/$releaseName"
          $chineseName = "清墨-$version-安装程序.exe"
          $chinesePath = "release/installer/$chineseName"
          if (!(Test-Path -LiteralPath $releasePath)) { throw "Missing release asset $releaseName." }
          if (!(Test-Path -LiteralPath $chinesePath)) { throw "Missing release asset $chineseName." }
          $releaseHash = (Get-FileHash $releasePath -Algorithm SHA256).Hash
          $chineseHash = (Get-FileHash $chinesePath -Algorithm SHA256).Hash
          if ($releaseHash -ne $chineseHash) { throw "Chinese and English installer assets differ." }
          $checksumLines = @(
            "$releaseHash  $releaseName"
            "$chineseHash  $chineseName"
          )
          $checksumPath = Join-Path (Resolve-Path "release/installer").Path "SHA256SUMS.txt"
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllLines($checksumPath, $checksumLines, $utf8NoBom)
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cleanmark-windows-installer
          path: |
            release/installer/CleanMark-*-Setup.exe
            release/installer/清墨-*-安装程序.exe
            release/installer/SHA256SUMS.txt
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: |
            release/installer/CleanMark-*-Setup.exe
            release/installer/清墨-*-安装程序.exe
            release/installer/SHA256SUMS.txt
          body: |
            清墨 Windows 安装器，仅安装到当前用户目录，不需要管理员权限。

            当前版本尚未进行商业代码签名，Windows 可能显示“未知发布者”。请从本仓库 Release 下载并核对 SHA-256。
