name: Windows Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run smoke
      - run: npm run test:e2e
      - run: npm run installer:win
      - name: 准备 GitHub Release 文件
        shell: powershell
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $source = Get-Item "release/installer/*.exe"
          $releaseName = "CleanMark-$version-Setup.exe"
          Copy-Item -LiteralPath $source.FullName -Destination "release/installer/$releaseName"
          Get-FileHash "release/installer/$releaseName" -Algorithm SHA256 | ForEach-Object { "$($_.Hash)  $releaseName" } | Set-Content -Encoding ascii "release/installer/SHA256SUMS.txt"
      - uses: actions/upload-artifact@v4
        with:
          name: cleanmark-windows-installer
          path: release/installer/*
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/installer/CleanMark-*-Setup.exe
            release/installer/SHA256SUMS.txt
          body: |
            清墨 Windows 安装器，仅安装到当前用户目录，不需要管理员权限。

            当前版本尚未进行商业代码签名，Windows 可能显示“未知发布者”。请从本仓库 Release 下载并核对 SHA-256。
